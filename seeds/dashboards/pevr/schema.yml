version: 2

seeds:
  - name: common_indicateurs_pevr_matiere
    description: Mapping des indicateurs communs avec leur description, leur code_matière, si c'est le cas, et leur numéros de compétences.   
    columns:
      - name: id_indicateur
        description: Identifiant de l'indicateur
        tests:
          - not_null
          - unique    
      - name: description_indicateur
        description: Description de l'indicateur
        tests:
          - not_null
          - unique            
      - name: code_matiere
        description: Code de la matière visée par l'indicateur pevr
        tests:
          - not_null
          - unique       
      - name: no_competence
        description: numéro de la compétence visé par l'indicateur pevr
        tests:
          - not_null
    config:
      tags: 
        - pevr
      schema: pevr_seeds
      column_types:
        id_indicateur: nvarchar(max)
        description_indicateur: nvarchar(max)      
        code_matiere: nvarchar(32)
        no_competence: nvarchar(32)
  
  - name: custom_indicateurs_pevr_matiere
    description: mapping optionnel des indicateurs personalisés des css.
    columns:
      - name: id_indicateur
        description: Identifiant de l'indicateur
        tests:
          - not_null
          - unique    
      - name: description_indicateur
        description: Description de l'indicateur
        tests:
          - not_null
          - unique       
      - name: code_matiere
        description: Code de la matière visée par l'indicateur pevr
        tests:
          - not_null
          - unique       
      - name: no_competence
        description: numéro de la compétence visé par l'indicateur pevr
        tests:
          - not_null
    config:
      tags: 
        - pevr
      schema: pevr_seeds
      column_types:
        id_indicateur: nvarchar(max)
        description_indicateur: nvarchar(max)      
        code_matiere: nvarchar(32)
        no_competence: nvarchar(32)

  - name: common_indicateurs_pevr
    description: Mapping des indicateurs communs avec leur description.   
    columns:
      - name: id_indicateur
        description: Identifiant de l'indicateur
        tests:
          - not_null
          - unique    
      - name: description_indicateur
        description: Description de l'indicateur
        tests:
          - not_null
          - unique            
    config:
      tags: 
        - pevr
      schema: pevr_seeds
      column_types:
        id_indicateur: nvarchar(max)
        description_indicateur: nvarchar(max)
  
  - name: custom_indicateurs_pevr
    description: mapping optionnel des indicateurs personalisés des css.
    columns:
      - name: id_indicateur
        description: Identifiant de l'indicateur
        tests:
          - not_null
          - unique    
      - name: description_indicateur
        description: Description de l'indicateur
        tests:
          - not_null
          - unique             
    config:
      tags: 
        - pevr
      schema: pevr_seeds
      column_types:
        id_indicateur: nvarchar(max)
        description_indicateur: nvarchar(max)      

  - name: indicateur_pevr_charl
    description: mapping obligatoire des données tirées de charlemagne pour les indicateurs 1 et 2
    columns:
      - name: id_indicateur
        description: L'identification unique du PEVR
        tests:
          - not_null
      - name: annee_scolaire
        description: L'année scolaire
        tests:
          - not_null
      - name: annee
        description: L'année de l'obtention du dip.
        tests:
          - not_null
      - name: taux
        description: Le pourcentage lié à l'indicateur et l'année scolaire
        tests:
          - not_null
    config:
      tags: 
        - pevr
      schema: pevr_seeds
      column_types:
        id_indicateur: nvarchar(max)
        annee_scolaire: nvarchar(max)
        periode: nvarchar(max)
        taux: decimal(5,3)